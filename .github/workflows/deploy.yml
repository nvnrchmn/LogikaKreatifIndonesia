name: Deploy to DirectAdmin

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Trigger Deployment Webhook
      run: |
        curl -X GET "https://logikraf.id/api/deploy/${{ secrets.DEPLOY_TOKEN }}" \
        -H "Accept: application/json"
