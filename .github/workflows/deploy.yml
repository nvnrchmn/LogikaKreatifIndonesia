name: Deploy to DirectAdmin

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Execute Deployment Commands via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }} # Biasanya 22
        script: |
          cd /home/sbdigita/domains/logikraf.id/laravel_core
          
          # Tarik kode terbaru dari GitHub
          git pull origin main
          
          # Install dependencies PHP
          composer install --no-interaction --prefer-dist --optimize-autoloader
          
          # Jalankan migrasi database
          php artisan migrate --force
          
          # Bersihkan cache Laravel
          php artisan optimize:clear
          
          # (Opsional) Jika Anda menggunakan Vite dan ingin mem-build asset di server
          # npm install
          # npm run build
          
          # Restart queue worker (jika Anda menggunakan antrean background/jobs)
          # php artisan queue:restart
